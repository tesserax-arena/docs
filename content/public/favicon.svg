<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!--
    Tesserax favicon - canonical geometry at 0.16× scale.
    Teal mark on void background; tuned for 16–32px legibility.
  -->
  <defs>
    <radialGradient id="fx-bg" cx="50%" cy="46%" r="68%">
      <stop offset="0%" stop-color="#101816"/>
      <stop offset="100%" stop-color="#09090f"/>
    </radialGradient>
    <linearGradient id="fx-teal" x1="11" y1="11" x2="21" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b8f5e4"/>
      <stop offset="45%" stop-color="#6bd4b0"/>
      <stop offset="100%" stop-color="#357a62"/>
    </linearGradient>
    <linearGradient id="fx-edge" x1="6" y1="7" x2="26" y2="25" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8a82ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6bd4b0" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="fx-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="32" height="32" fill="url(#fx-bg)"/>

  <polygon
    points="6,8 25,7 26,25 7,27"
    fill="none"
    stroke="#6bd4b0"
    stroke-width="0.85"
    stroke-linejoin="miter"
    opacity="0.35"
  />

  <g stroke="url(#fx-edge)" stroke-width="0.75" stroke-linecap="round" fill="none" opacity="0.8">
    <line x1="6" y1="8" x2="11" y2="12"/>
    <line x1="25" y1="7" x2="21" y2="11"/>
    <line x1="26" y1="25" x2="21" y2="21"/>
    <line x1="7" y1="27" x2="11" y2="22"/>
  </g>

  <g filter="url(#fx-glow)">
    <polygon
      points="11,12 21,11 21,21 11,22"
      fill="url(#fx-teal)"
      fill-opacity="0.22"
      stroke="#d4fff0"
      stroke-width="1.15"
      stroke-linejoin="miter"
    />
  </g>
</svg>
